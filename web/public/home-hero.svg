<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">D-care clinical workspace</title>
  <desc id="desc">Abstract illustration of a calm clinical dashboard with charts and care motifs.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="640" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#e8f0f8"/>
      <stop offset="1" stop-color="#f0f7fc"/>
    </linearGradient>
